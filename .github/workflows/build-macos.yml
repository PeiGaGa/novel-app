name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build Intel and Apple Silicon packages
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DMG and ZIP packages
        run: npm run dist:mac

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-macos-${{ github.run_number }}
          path: |
            release/*-mac-x64.dmg
            release/*-mac-x64.zip
            release/*-mac-arm64.dmg
            release/*-mac-arm64.zip
          if-no-files-found: error
          retention-days: 14
